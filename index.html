<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>唐怡婷 Eliza Tang | 因果推断与数字平台研究者 · 悉尼大学</title>
  <meta name="description" content="唐怡婷 Eliza Tang 的个人网站。">
  <meta name="keywords" content="唐怡婷,Eliza Tang,因果推断,数字平台经济学,悉尼大学,计量经济学,城市空中出行,UAM,偏好外部性">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#020617">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #020617;
      --cyan: #22d3ee;
      --blue: #0ea5e9;
      --purple: #818cf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --glow: rgba(34, 211, 238, 0.45);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    canvas#grid {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 4px
      );
    }

    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(2, 6, 23, 0.85) 100%);
    }

    main {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border: 1px solid rgba(34, 211, 238, 0.35);
      border-radius: 999px;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(34, 211, 238, 0.06);
      margin-bottom: 2rem;
      animation: pulse-border 2.5s ease-in-out infinite;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
      animation: blink 1.2s step-end infinite;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    h1::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      clip-path: inset(0 0 0 0);
      animation: glitch 4s infinite;
      opacity: 0.7;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: var(--muted);
      margin-bottom: 2.5rem;
      max-width: 520px;
      line-height: 1.7;
    }

    .terminal {
      width: min(560px, 100%);
      text-align: left;
      border: 1px solid rgba(34, 211, 238, 0.2);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(12px);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(14, 165, 233, 0.08), inset 0 1px 0 rgba(255,255,255,0.04);
      margin-bottom: 2rem;
    }

    .terminal-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0.65rem 1rem;
      background: rgba(0, 0, 0, 0.35);
      border-bottom: 1px solid rgba(34, 211, 238, 0.12);
    }

    .terminal-bar span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .terminal-bar span:nth-child(1) { background: #ef4444; }
    .terminal-bar span:nth-child(2) { background: #eab308; }
    .terminal-bar span:nth-child(3) { background: #22c55e; }

    .terminal-title {
      margin-left: auto;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .terminal-body {
      padding: 1.25rem 1.25rem 1rem;
      font-size: 0.78rem;
      line-height: 1.8;
      min-height: 120px;
    }

    .terminal-body .prompt { color: var(--cyan); }
    .terminal-body .cmd { color: #f8fafc; }
    .terminal-body .output { color: var(--muted); }
    .terminal-body .success { color: #4ade80; }
    .cursor {
      display: inline-block;
      width: 8px;
      height: 1em;
      background: var(--cyan);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    .progress-wrap {
      width: min(400px, 100%);
      margin-bottom: 2rem;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.08em;
    }

    .progress-bar {
      height: 3px;
      background: rgba(34, 211, 238, 0.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--blue), var(--purple));
      border-radius: 999px;
      box-shadow: 0 0 12px var(--glow);
      animation: load 3s ease-in-out infinite alternate;
    }

    .footer-note {
      font-size: 0.72rem;
      color: rgba(100, 116, 139, 0.7);
      letter-spacing: 0.04em;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.15); }
      50% { box-shadow: 0 0 20px 2px rgba(34, 211, 238, 0.2); }
    }

    @keyframes load {
      0% { width: 18%; }
      100% { width: 72%; }
    }

    @keyframes glitch {
      0%, 90%, 100% { clip-path: inset(0 0 0 0); transform: translate(0); }
      91% { clip-path: inset(20% 0 60% 0); transform: translate(-3px, 1px); }
      93% { clip-path: inset(60% 0 10% 0); transform: translate(3px, -1px); }
      95% { clip-path: inset(40% 0 30% 0); transform: translate(-2px, 0); }
    }

    @media (max-width: 480px) {
      .terminal-body { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
  <canvas id="grid"></canvas>
  <div class="scanlines"></div>
  <div class="vignette"></div>

  <main>
    <div class="badge">
      <span class="badge-dot"></span>
      System Maintenance
    </div>

    <h1 data-text="网站施工中">网站施工中</h1>
    <p class="subtitle">
      Site upgrade in progress — new experience launching soon.<br>
      本站正在重构与优化，暂时不对外公开访问。
    </p>

    <div class="terminal">
      <div class="terminal-bar">
        <span></span><span></span><span></span>
        <span class="terminal-title">elizatang007.github.io — bash</span>
      </div>
      <div class="terminal-body" id="terminal"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>DEPLOY STATUS</span>
        <span id="progress-pct">—</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

    <p class="footer-note">唐怡婷（Eliza Yiting Tang）· 悉尼大学因果推断与数字平台经济学研究者 · © 2025</p>
  </main>

  <script>
    (function () {
      var canvas = document.getElementById('grid');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var mouse = { x: -9999, y: -9999 };
      var count = 80;
      var maxDist = 140;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
      }

      function initParticles() {
        particles = [];
        for (var i = 0; i < count; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4,
            r: Math.random() * 1.5 + 0.5
          });
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
          if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(34, 211, 238, 0.55)';
          ctx.fill();

          for (var j = i + 1; j < particles.length; j++) {
            var q = particles[j];
            var dx = p.x - q.x;
            var dy = p.y - q.y;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < maxDist) {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(q.x, q.y);
              ctx.strokeStyle = 'rgba(14, 165, 233, ' + (1 - dist / maxDist) * 0.35 + ')';
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }

          var mdx = p.x - mouse.x;
          var mdy = p.y - mouse.y;
          var mdist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mdist < maxDist * 1.2) {
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = 'rgba(129, 140, 248, ' + (1 - mdist / (maxDist * 1.2)) * 0.5 + ')';
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', function (e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });
      resize();
      draw();

      var lines = [
        { html: '<span class="prompt">$</span> <span class="cmd">status --site elizatang007.github.io</span>', delay: 0 },
        { html: '<span class="output">Checking deployment pipeline...</span>', delay: 600 },
        { html: '<span class="output">Modules: portfolio · research · ventures</span>', delay: 1200 },
        { html: '<span class="success">→ Status: UNDER CONSTRUCTION</span>', delay: 1900 },
        { html: '<span class="output">ETA: coming soon</span><span class="cursor"></span>', delay: 2600 }
      ];

      var terminal = document.getElementById('terminal');
      var pct = document.getElementById('progress-pct');
      var shown = 0;

      function showNext() {
        if (shown >= lines.length) return;
        var line = lines[shown];
        setTimeout(function () {
          var div = document.createElement('div');
          div.innerHTML = line.html;
          if (shown > 0) terminal.removeChild(terminal.lastChild);
          terminal.appendChild(div);
          shown++;
          if (shown < lines.length) showNext();
        }, shown === 0 ? 400 : lines[shown].delay - (shown > 0 ? lines[shown - 1].delay : 0));
      }
      showNext();

      var progress = 42;
      setInterval(function () {
        progress = 38 + Math.floor(Math.random() * 28);
        pct.textContent = progress + '%';
      }, 2200);
      pct.textContent = '42%';
    })();
  </script>
</body>
</html>
